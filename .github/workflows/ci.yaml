name: CI

on:
  push:
    branches: [main, beta, alpha, next]
  pull_request:
    branches: [main, beta, alpha, next]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run format
      # cspell@10 requires Node >=22.18; keep runtime coverage on 20, spell on 22 only.
      - if: matrix.node-version == 22
        run: pnpm run spell
      - run: pnpm run build
      - run: pnpm run test
